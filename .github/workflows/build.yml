name: Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 16
        uses: actions/setup-java@v4
        with:
          java-version: '16'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn -B -DskipTests package --no-transfer-progress

      - name: Upload plugin JAR
        uses: actions/upload-artifact@v4
        with:
          name: BetterHome-${{ github.sha }}
          path: target/BetterHome-*.jar
          retention-days: 30
