    material: LIME_STAINED_GLASS_PANE
    display-name: "&a確認"
  cancel-item:
    material: RED_STAINED_GLASS_PANE
    display-name: "&c取消"

# ========================================
#          傳送提示
# ========================================
titles:
  cooldown-title:
    enable: true
    teleport-title: "&a正在準備傳送..."
    teleport-subtitle: "&e%seconds% 秒後完成"
  static-title:
    enable: false
    teleport-title: "&a傳送中..."
    teleport-subtitle: "&e請稍候"
  teleport-finish:
    enable: true
    title: "&a傳送完成！"
    subtitle: "&7已到達目的地"
    fade-in: 10
    stay: 40
    fade-out: 10

action-bar:
  cooldown-title:
    enable: true
    teleport-message: "&7即將在 &b%seconds% &7秒後傳送"
  static-title:
    enable: false
    teleport-subtitle: "&7請稍候，正在傳送..."
  teleport-finish:
    enable: true
    message: "&a已成功傳送至家園"
    duration-ticks: 40

