    material: LIME_STAINED_GLASS_PANE
    display-name: "&a確認"
  cancel-item:
    material: RED_STAINED_GLASS_PANE
    display-name: "&c取消"

confirmation-menu-admin:
  gui-title: "&c確認刪除玩家的家園"
