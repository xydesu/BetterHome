# ========================================
#          基本設定
# ========================================

# 每位玩家預設可擁有的最大家數量
default-max-homes: 3

# 傳送過程中是否允許移動 (true = 移動會取消傳送)
cancel-on-move: true

# 傳送冷卻時間（單位：秒）
teleport-cooldown: 5

# 禁止設定家的世界
blacklisted-worlds:
  - world_nether
  - world_the_end

# ========================================
#                日誌設定
# ========================================
log:
  # 是否將除錯訊息輸出到主控台 (server log)
  console-debug: false

  # 是否將除錯訊息顯示給擁有 betterhome.debug 權限的在線玩家 (game chat)
  notify-debug-to-players: false

  # 廣播設定：控制插件啟動/關閉時是否廣播訊息給玩家
  broadcast:
    startup:
      enabled: true
      message: "&a[BetterHome] 插件已啟用，使用 /%command% 打開家園選單。"

    shutdown:
      enabled: true
      message: "&c[BetterHome] 插件已關閉，家園功能暫時無法使用。"

